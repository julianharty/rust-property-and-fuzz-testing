name: Rust CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: PROPTEST_VERBOSE=1 cargo test --workspace --all-features

  fuzz-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
      - run: cargo install cargo-fuzz --locked
      - run: cargo fuzz build parse_hex
      - run: cargo fuzz run parse_hex -- -max_total_time=60
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: fuzz-artifacts
          path: fuzz/artifacts
